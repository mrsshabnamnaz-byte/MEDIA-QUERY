<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 2 - Responsive Image Gallery</title>

  <style>

    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', Times, serif;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      padding: 30px 20px 10px;
      font-size: 2rem;
      color: #222;
    }

    p {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    /* ================================
            GALLERY GRID
    ================================ */
    .gallery {
      display: grid;
      gap: 15px;
      padding: 0 20px 40px;

      /* MOBILE — 1 image per row */
      grid-template-columns: 1fr;
    }

    /* TABLET — 2 images per row */
    @media (min-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* DESKTOP — 4 images per row */
    @media (min-width: 1200px) {
      .gallery {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* ================================
             GALLERY ITEM
    ================================ */
    .gallery-item {
      border-radius: 8px;
      overflow: hidden;
      background-color: #ddd;
    }

    /* ================================
            RESPONSIVE IMAGE
      ================================ */
    .gallery-item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    /* ================================
            IMAGE CAPTION
    ================================ */
    .gallery-item .caption {
      background-color: #222;
      color: #fff;
      text-align: center;
      padding: 10px;
      font-size: 0.9rem;
    }

  </style>
</head>
<body>

  <h1>Responsive Image Gallery</h1>
  <p>1 column on mobile &nbsp;|&nbsp; 2 columns on tablet &nbsp;|&nbsp; 4 columns on desktop</p>

   <!-- ================================

     ================================ -->

</body>
